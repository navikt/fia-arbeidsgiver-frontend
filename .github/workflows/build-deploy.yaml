name: Build, test and deploy
run-name: Build and deploy app || ${{ github.event.head_commit.message }}
on: [ push ]

env:
  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build
        run: pnpm build
      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: |
            .next
            !.next/cache
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  tests:
    name: Test and lint
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Lint
        run: pnpm lint
      - name: Run testing-library tests
        run: pnpm test
      - name: Download build output
        uses: actions/download-artifact@v7
        with:
          name: next-build
          path: .next
      - name: Run Playwright tests
        run: ./scripts/e2e.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
          PLAYWRIGHT_WORKERS: 2
          E2E_SKIP_BUILD: "1"
          E2E_NEXT: ./.next
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: .test/spec/results/
          retention-days: 7
          overwrite: true

  package:
    permissions:
      id-token: write
    name: Package image
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ github.actor != 'dependabot[bot]' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Download build output
        uses: actions/download-artifact@v7
        with:
          name: next-build
          path: .next
      - name: Push to Google Artifact Registry
        uses: nais/docker-build-push@v0
        id: docker-push
        with:
          team: pia
    outputs:
      image: ${{ steps.docker-push.outputs.image }}

  deploy:
    permissions:
      id-token: write
    strategy:
      matrix:
        cluster: [ dev, prod ]
    name: Deploy to ${{ matrix.cluster }}
    needs: package
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Deploy application to ${{ matrix.cluster }}
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: ${{ matrix.cluster }}-gcp
          RESOURCE: .nais/nais.yaml
          VARS: .nais/${{ matrix.cluster }}.yaml
          IMAGE: ${{ needs.package.outputs.image }}

  deploy-dev:
    permissions:
      id-token: write
    name: Deploy app to dev
    needs: package
    if: github.ref == 'refs/heads/aksel-v8'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Deploy application to dev
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais.yaml
          VARS: .nais/dev.yaml
          VAR: image=${{ needs.package.outputs.image }}

  trivy-scan:
    if: ${{ github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]' }}
    env:
      TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
    name: Scanner docker image med Trivy
    needs: package
    permissions:
      contents: read # to write sarif
      security-events: write # push sarif to github security
      id-token: write # for nais/login
    runs-on: ubuntu-latest
    steps:
      - uses: navikt/pia-actions/trivy-scan@v1 # https://github.com/navikt/pia-actions/tree/main/trivy-scan
        with:
          image: ${{ needs.package.outputs.image }}
          team: pia
